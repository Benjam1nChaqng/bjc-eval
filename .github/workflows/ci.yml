name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Run tests
        run: |
          pytest tests/ -v --cov=swe_judge --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  smoke-test-cli:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: CLI help works
        run: swe-judge --help
      - name: CLI run with mock judge works
        run: |
          mkdir -p outputs runs
          python -c "
          import json
          ids = ['01KRMSEED0000000000000001','01KRMSEED0000000000000002','01KRMSEED0000000000000003','01KRMSEED0000000000000004','01KRMSEED0000000000000005']
          with open('outputs/mock_outputs.jsonl', 'w') as f:
              for i, tid in enumerate(ids):
                  f.write(json.dumps({'task_id': tid, 'output': f'mock output {i}'}) + chr(10))
          "
          swe-judge run \
            --tasks data/golden_seed.jsonl \
            --outputs outputs/mock_outputs.jsonl \
            --model mock-model-under-test \
            --judges mock \
            --db runs/ci.sqlite
